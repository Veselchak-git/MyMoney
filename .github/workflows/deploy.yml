name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Ensure environments directory
        run: mkdir -p src/environments

      - name: Create environment file
        run: |
          cat > src/environments/environment.ts << 'EOF'
          export const environment = {
            production: false,
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}',
            },
          };
          EOF

          cp src/environments/environment.ts src/environments/environment.prod.ts

      - run: npx ng build --configuration production --base-href /MyMoney/

      - name: Copy index.html as 404.html (SPA fallback)
        run: cp dist/MyMoney/browser/index.html dist/MyMoney/browser/404.html

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/MyMoney/browser
          deploy_mode: deploy_from_branch
