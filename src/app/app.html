@if (user()) {
  <div class="shell">
    <header class="app-header">
      <div class="app-header__inner">
        <span class="app-header__logo">
          <img src="logo-32.png" alt="" width="32" height="32" class="app-header__icon">
          Мои Финансы
        </span>

        <nav class="app-nav">
          @for (item of navItems; track item.path) {
            <a
              [routerLink]="[item.path]"
              routerLinkActive="app-nav__link--active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              class="app-nav__link"
            >
              <i [class]="item.icon" class="app-nav__icon"></i>
              <span class="app-nav__label">{{ item.label }}</span>
            </a>
          }
        </nav>

        <div class="app-header__right">
          <span class="app-header__email">{{ user()?.email }}</span>
          <button
            class="app-header__hamburger"
            (click)="mobileMenuOpen.set(true)"
            aria-label="Меню"
          >
            <i class="pi pi-bars"></i>
          </button>
          <button class="app-header__logout" (click)="logout()" aria-label="Выйти">
            <i class="pi pi-sign-out"></i>
          </button>
        </div>
      </div>
    </header>

    @if (mobileMenuOpen()) {
      <div class="mobile-menu-mask" (click)="mobileMenuOpen.set(false)"></div>
      <div class="mobile-menu">
        <div class="mobile-menu__header">
          <span class="mobile-menu__title">
            <img src="logo-32.png" alt="" width="32" height="32" class="app-header__icon">
            Мои Финансы
          </span>
          <button class="mobile-menu__close" (click)="mobileMenuOpen.set(false)" aria-label="Закрыть">
            <i class="pi pi-times"></i>
          </button>
        </div>
        <div class="mobile-menu__user">
          <i class="pi pi-user"></i>
          {{ user()?.email }}
        </div>
        <nav class="mobile-menu__nav">
          @for (item of navItems; track item.path) {
            <a
              [routerLink]="[item.path]"
              routerLinkActive="mobile-menu__link--active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              class="mobile-menu__link"
              (click)="mobileMenuOpen.set(false)"
            >
              <i [class]="item.icon"></i>
              {{ item.label }}
            </a>
          }
        </nav>
      </div>
    }

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
