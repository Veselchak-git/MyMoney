<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <p-card class="w-full max-w-md">
    <ng-template pTemplate="title">
      <div class="text-center">
        <i class="pi pi-wallet text-4xl text-primary mb-2"></i>
        <h2 class="text-2xl font-bold text-gray-800 m-0">Мои Финансы</h2>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (error()) {
        <div class="bg-red-50 text-red-700 p-3 rounded-lg mb-4 text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="submit()" class="flex flex-col gap-4">
        <input
          pInputText
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          class="w-full"
          required
          autocomplete="email"
        />

        <input
          pInputText
          type="password"
          placeholder="Пароль"
          [(ngModel)]="password"
          name="password"
          class="w-full"
          required
          autocomplete="current-password"
        />

        <p-button
          type="submit"
          [loading]="loading()"
          [label]="isLogin() ? 'Войти' : 'Зарегистрироваться'"
          styleClass="w-full justify-center"
        />
      </form>

      <p-divider>или</p-divider>

      <p-button
        (click)="googleLogin()"
        label="Google"
        icon="pi pi-google"
        styleClass="w-full justify-center p-button-outlined"
        [loading]="loading()"
      />

      <div class="text-center mt-4">
        <button
          type="button"
          (click)="toggleMode()"
          class="text-primary hover:text-primary-dark text-sm border-none bg-transparent cursor-pointer underline"
        >
          {{ isLogin() ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти' }}
        </button>
      </div>
    </ng-template>
  </p-card>
</div>
