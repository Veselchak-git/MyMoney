<div class="auth-page">
  <div class="auth-card slide-up">
    <div class="auth-card__header">
      <div class="auth-card__logo">
        <img src="logo-48.png" alt="Мои Финансы" width="48" height="48" class="auth-card__icon">
      </div>
      <h1 class="auth-card__title">Мои Финансы</h1>
      <p class="auth-card__subtitle">Ведите учёт доходов и расходов</p>
    </div>

    @if (error()) {
      <div class="auth-error">
        <i class="pi pi-exclamation-circle"></i>
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="auth-field">
        <label for="email" class="sr-only">Электронная почта</label>
        <input
          pInputText
          id="email"
          type="email"
          placeholder="Электронная почта"
          [(ngModel)]="email"
          name="email"
          class="w-full"
          required
          autocomplete="email"
        />
      </div>

      <div class="auth-field">
        <label for="password" class="sr-only">Пароль</label>
        <input
          pInputText
          id="password"
          type="password"
          placeholder="Пароль"
          [(ngModel)]="password"
          name="password"
          class="w-full"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="auth-btn__spinner"></span>
        }
        {{ isLogin() ? 'Войти' : 'Зарегистрироваться' }}
      </button>
    </form>

    <div class="auth-toggle">
      <button type="button" (click)="toggleMode()" class="auth-toggle__btn">
        {{ isLogin() ? 'Нет аккаунта? Зарегистрироваться' : 'Уже есть аккаунт? Войти' }}
      </button>
    </div>
  </div>
</div>
