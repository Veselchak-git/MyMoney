<div class="page page--form">
  <h1 class="page-title">
    {{ isEdit() ? 'Редактировать транзакцию' : 'Новая транзакция' }}
  </h1>

  <div class="card">
    <form>
      <div class="field">
        <label for="type-toggle">Тип</label>
        <div class="type-toggle" id="type-toggle">
          <button
            type="button"
            class="type-toggle__btn--expense"
            [class.type-toggle__btn--active]="type() === 'expense'"
            (click)="type.set('expense')"
            [attr.aria-pressed]="type() === 'expense'"
          >
            <i class="pi pi-arrow-down"></i>
            Расход
          </button>
          <button
            type="button"
            class="type-toggle__btn--income"
            [class.type-toggle__btn--active]="type() === 'income'"
            (click)="type.set('income')"
            [attr.aria-pressed]="type() === 'income'"
          >
            <i class="pi pi-arrow-up"></i>
            Доход
          </button>
        </div>
      </div>

      <div class="field">
        <label for="amount">Сумма (₽)</label>
        <p-inputNumber
          [(ngModel)]="amount"
          name="amount"
          [min]="0"
          [max]="999999999"
          inputId="amount"
          placeholder="0.00"
          class="w-full"
          mode="decimal"
          [minFractionDigits]="2"
          [maxFractionDigits]="2"
        />
      </div>

      <div class="field">
        <label for="categoryId">Категория</label>
        @if (!categoriesLoaded()) {
          <div class="loading">Загрузка категорий...</div>
        } @else if (categoriesError()) {
          <div class="error">{{ categoriesError() }}</div>
        } @else {
          <p-select
            [(ngModel)]="categoryId"
            name="categoryId"
            [options]="categories()"
            optionLabel="name"
            optionValue="id"
            placeholder="Выберите категорию"
            class="w-full"
          >
            <ng-template pTemplate="item" let-item>
              <div class="flex items-center gap-2">
                <i [class]="item.icon" class="text-sm"></i>
                <span>{{ item.name }}</span>
              </div>
            </ng-template>
          </p-select>
        }
      </div>

      <div class="field">
        <label for="date">Дата</label>
        <p-datepicker
          [(ngModel)]="date"
          name="date"
          dateFormat="dd.mm.yy"
          class="w-full"
        />
      </div>

      <div class="field">
        <label for="description">Описание</label>
        <textarea
          pTextarea
          [(ngModel)]="description"
          name="description"
          placeholder="Необязательно"
          rows="3"
          class="w-full"
        ></textarea>
      </div>

      <div class="form-actions">
        <a routerLink="/transactions">
          <button type="button">Отмена</button>
        </a>
        <button
          type="button"
          class="btn-primary"
          (click)="save()"
          [disabled]="!categoryId || !amount || loading()"
        >
          @if (loading()) {
            <span class="spinner"></span>
          }
          {{ isEdit() ? 'Сохранить' : 'Добавить' }}
        </button>
      </div>
    </form>
  </div>
</div>
