<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
    <div class="flex items-center gap-8">
      <a routerLink="/" class="flex items-center gap-2 no-underline text-gray-800">
        <i class="pi pi-wallet text-primary text-xl"></i>
        <span class="font-bold text-lg">Мои Финансы</span>
      </a>

      <nav class="hidden md:flex items-center gap-1">
        @for (item of navItems; track item.path) {
          <a
            [routerLink]="[item.path]"
            routerLinkActive="bg-primary/10 text-primary"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
            class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-gray-600 hover:bg-gray-100 no-underline transition-colors"
          >
            <i [class]="item.icon"></i>
            {{ item.label }}
          </a>
        }
      </nav>
    </div>

    <div class="flex items-center gap-3">
      @if (user) {
        <span class="text-sm text-gray-500 hidden sm:block">{{ user.email }}</span>
        <p-button
          (click)="logout()"
          icon="pi pi-sign-out"
          severity="secondary"
          [rounded]="true"
          [text]="true"
          pTooltip="Выйти"
        />
      }
    </div>
  </div>
</header>
